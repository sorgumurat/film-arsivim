<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Film Arşivi - TMDB + Embed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; font-family: system-ui; color: #fff; }
        .header { background: #141414; padding: 20px; text-align: center; border-bottom: 1px solid #333; }
        .header h1 { font-size: 1.8rem; background: linear-gradient(135deg, #e50914, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-area { max-width: 600px; margin: 30px auto; padding: 0 20px; }
        .search-box { display: flex; gap: 10px; background: #2a2a2a; border-radius: 40px; padding: 5px; }
        .search-box input { flex: 1; background: transparent; border: none; padding: 14px 20px; color: white; font-size: 1rem; outline: none; }
        .search-box button { background: #e50914; border: none; padding: 0 25px; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; }
        .results-info { max-width: 1200px; margin: 20px auto; padding: 0 20px; color: #888; border-bottom: 1px solid #333; }
        .movie-grid { max-width: 1200px; margin: 0 auto; padding: 0 20px 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .movie-card { background: #1a1a1a; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .movie-card:hover { transform: translateY(-5px); background: #2a2a2a; }
        .movie-poster { aspect-ratio: 2/3; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .movie-poster img { width: 100%; height: 100%; object-fit: cover; }
        .movie-info { padding: 12px; }
        .movie-title { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .movie-year { font-size: 0.7rem; color: #888; margin-top: 4px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; }
        .modal.active { display: block; }
        .modal-header { background: #1a1a1a; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 1rem; }
        .modal-close { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .modal-close:hover { color: #e50914; }
        .modal-video { width: 100%; height: calc(100% - 60px); background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .status { text-align: center; padding: 60px; color: #666; }
    </style>
</head>
<body>

<div class="header">
    <h1>🎬 Film Arşivi</h1>
    <div style="font-size: 0.8rem; color: #888; margin-top: 5px;">TMDB + Embed | Altyazı & Dual Ses Desteği</div>
</div>

<div class="search-area">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Film ara... (örn: Avatar, Matrix)" autofocus>
        <button onclick="searchMovies()">🔍 Ara</button>
    </div>
</div>

<div id="resultsInfo" class="results-info" style="display: none;"><span id="resultCount">0</span> sonuç bulundu</div>
<div id="movieGrid" class="movie-grid"><div class="status">🎬 Film aramak için yukarıya bir isim yazın</div></div>

<div id="playerModal" class="modal">
    <div class="modal-header">
        <h3 id="playerTitle">Film İzle</h3>
        <button class="modal-close" onclick="closePlayer()">✕</button>
    </div>
    <div id="playerContainer" class="modal-video">
        <div class="loading">⏳ Yükleniyor...</div>
    </div>
</div>

<script>
    // TMDB API Key (Sizin aldığınız anahtar)
    const TMDB_API_KEY = 'e482e6dc4fe81df89c51267e9e14cf96';
    
    // Çalışan embed servisleri (sırayla denenir)
    const EMBED_SERVERS = [
        'https://vidsrc.to/embed/movie/',
        'https://www.2embed.cc/embed/',
        'https://embed.su/embed/movie/',
        'https://multiembed.mov/directstream.php?video_id='
    ];
    let currentServer = 0;
    
    async function searchMovies() {
        const query = document.getElementById('searchInput').value.trim();
        if (query.length < 2) {
            document.getElementById('movieGrid').innerHTML = '<div class="status">🔍 En az 2 karakter girin</div>';
            return;
        }
        
        document.getElementById('movieGrid').innerHTML = '<div class="status">⏳ Filmler aranıyor...</div>';
        
        try {
            const response = await fetch(
                `https://api.themoviedb.org/3/search/movie?api_key=${TMDB_API_KEY}&query=${encodeURIComponent(query)}&language=tr-TR`
            );
            const data = await response.json();
            
            const results = data.results || [];
            document.getElementById('resultCount').innerText = results.length;
            document.getElementById('resultsInfo').style.display = 'block';
            
            if (results.length === 0) {
                document.getElementById('movieGrid').innerHTML = '<div class="status">🎬 Film bulunamadı. Farklı bir kelime deneyin.</div>';
                return;
            }
            
            document.getElementById('movieGrid').innerHTML = results.map(movie => `
                <div class="movie-card" onclick="playMovie(${movie.id}, '${movie.title.replace(/'/g, "\\'")}', ${movie.release_date ? movie.release_date.substring(0,4) : '0'})">
                    <div class="movie-poster">
                        ${movie.poster_path ? `<img src="https://image.tmdb.org/t/p/w200${movie.poster_path}" alt="${movie.title}">` : '🎬'}
                    </div>
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-year">${movie.release_date ? movie.release_date.substring(0,4) : '?'}</div>
                    </div>
                </div>
            `).join('');
            
        } catch(e) {
            console.error(e);
            document.getElementById('movieGrid').innerHTML = '<div class="status">❌ API hatası. Lütfen tekrar deneyin.</div>';
        }
    }
    
    function playMovie(movieId, title, year) {
        const modal = document.getElementById('playerModal');
        const container = document.getElementById('playerContainer');
        const titleEl = document.getElementById('playerTitle');
        
        titleEl.innerText = `${title} (${year || '?'})`;
        modal.classList.add('active');
        
        currentServer = 0;
        loadEmbed(movieId);
    }
    
    function loadEmbed(movieId) {
        const container = document.getElementById('playerContainer');
        let embedUrl;
        
        if (EMBED_SERVERS[currentServer].includes('multiembed')) {
            embedUrl = EMBED_SERVERS[currentServer] + movieId + '&source=vidsrc';
        } else {
            embedUrl = EMBED_SERVERS[currentServer] + movieId;
        }
        
        container.innerHTML = `
            <iframe src="${embedUrl}" 
                    allowfullscreen 
                    allow="autoplay; encrypted-media"
                    sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"
                    style="width:100%; height:100%; border:none;">
            </iframe>
            <div style="position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,0.6); padding:4px 8px; border-radius:8px; font-size:11px; color:#888;">
                Kaynak: ${EMBED_SERVERS[currentServer].replace('https://', '').replace('/embed/movie/', '').replace('/directstream.php?video_id=', '')}
            </div>
        `;
        
        // 8 saniye sonra iframe yüklenmediyse sonraki servisi dene
        setTimeout(() => {
            const iframe = container.querySelector('iframe');
            if (iframe && !iframe.contentDocument && iframe.contentWindow === null) {
                currentServer++;
                if (currentServer < EMBED_SERVERS.length) {
                    console.log(`Embed servisi çalışmadı, ${EMBED_SERVERS[currentServer]} deneniyor...`);
                    loadEmbed(movieId);
                } else {
                    container.innerHTML = '<div class="loading">❌ Hiçbir embed servisi çalışmadı.<br><br>📌 Farklı bir film deneyin veya daha sonra tekrar deneyin.</div>';
                }
            }
        }, 8000);
    }
    
    function closePlayer() {
        document.getElementById('playerModal').classList.remove('active');
        document.getElementById('playerContainer').innerHTML = '<div class="loading">⏳ Yükleniyor...</div>';
    }
    
    document.getElementById('searchInput').addEventListener('keypress', e => { if (e.key === 'Enter') searchMovies(); });
</script>
</body>
</html>
